services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mp_publishing
      POSTGRES_USER: mp_publishing
      POSTGRES_PASSWORD: mp_publishing
    ports:
      - "5432:5432"
    volumes:
      - mp_publishing_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mp_publishing -d mp_publishing"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - mp_publishing_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mp_publishing_postgres:
  mp_publishing_redis:
